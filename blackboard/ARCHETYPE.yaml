name: blackboard
kind: composite
description: >
  Opportunistic multi-agent coordination over a shared structured workspace.
  Hearsay-II's pattern, named for Declarative Software Development.
  Knowledge Sources watch the workspace, contribute their piece on
  recognition of patterns matching their expertise, and emit proposals
  with confidence scores. A Control component opportunistically schedules
  which Knowledge Source to invoke next. Supports transient (session-scoped)
  and persistent (long-running understanding accumulation) modes.
