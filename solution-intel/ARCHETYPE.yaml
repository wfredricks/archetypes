name: solution-intel
kind: composite
status: draft
description: >
  The flagship Solution Intelligence substrate. Every project adopts solution-intel
  first to host its own SIG and run the declarative-SDD loop. Composes identity,
  audit, eventing, graph, and (eventually) NL chat + agents + orchestrator into a
  coherent substrate. The archetypes registry itself will adopt this archetype on
  itself once it is feature-complete, becoming the first self-hosted project.

reference_languages:
  primary: typescript
  available_translations: []

composes:
  - simple-auth
  - simple-ledger    # via chainblocks; Stage 3 makes this concrete
  - events-spine     # Stage 2d adopts this into SI
  - graph-db         # via polygraph
  - nl-chat-substrate

reference_impl:
  in_tree: true
  pointer_paths:
    - ./reference-impl/identity/
    - ./reference-impl/cli/
    - ./reference-impl/graph-client/
    - ./reference-impl/agents/
    - ./reference-impl/contract-loader/
    - ./reference-impl/scripts/
  # Stage 3 will add a graph path:
  #   - ./reference-impl/graph/    (pending: solution-intelligence-graph)
  in_tree_since: 2026-05-21
  in_tree_commit_tag: solution-intel-reference-impl-2026-05-22d
  in_tree_amendments:
    - tag: solution-intel-reference-impl-agents-2026-05-22
      added: ./reference-impl/agents/
      source: wfredricks/archetypes-solution-intelligence/agents/ @ 0.1.0-pre
    - tag: solution-intel-reference-impl-2026-05-22b
      added: "./reference-impl/contract-loader/, ./reference-impl/scripts/, workspace metadata template"
      refreshed: "./reference-impl/cli/ (Phase 1c - + commands/contracts.ts + commands/agents.ts; F1 status+verifiedAt render), ./reference-impl/identity/ (Phase 1a F4 tsconfig.eslint.json rootDir fix lifted)"
      harmonized: "Hypothesis.verifiedAt storage type — canonical wire type is ISO-8601 string at the contract-loader boundary"
      source: "wfredricks/archetypes-solution-intelligence @ commit 195096307965d7ccd1a5ddac5da1b09db6b77b60"
    - tag: solution-intel-reference-impl-2026-05-22c
      refreshed: "./reference-impl/contract-loader/ (Phase 1e — backend-pluggable adapter; PolyGraph default in the canonical archetype; new @adopt:default-backend marker; public function signatures unchanged)"
      added: "src/backends/{types,select,neo4j-backend,polygraph-backend}.ts, tests/backends-differential.test.ts, polygraph-db@^0.1.4 dependency"
      source: "wfredricks/archetypes-solution-intelligence @ commit 3dbc71a2110a3b6a7d5f5422488102c2a4daf4e8"
    - tag: solution-intel-reference-impl-2026-05-22d
      refreshed: "./reference-impl/agents/ (Phase 2.5 — backend-pluggable adapter lifted from contract-loader; PolyGraph default in the canonical archetype; new @adopt:default-backend marker; public function signatures of runCompletenessAgent / runBookendAuditAgent unchanged)"
      added: "agents/src/backends/{types,select,neo4j-backend,polygraph-backend}.ts, agents/tests/backends-differential.test.ts, polygraph-db@^0.1.4 dependency, two new Backend.native helpers (countOutgoingRels, countIncomingRels) for the three aggregation rules"
      source: "wfredricks/archetypes-solution-intelligence @ commit cc6bc8687ee61e17994a65e2f7be92d065155a8f"

adopters: []  # populated when the archetypes registry adopts solution-intel on itself

defects_known: []  # back-filled at full lift from all SI build findings

trigger_conditions_for_full_lift:
  - solution-intelligence-identity at >=0.2.0-pre  # ✅
  - solution-intelligence-cli at >=0.2.0-pre        # ✅
  - solution-intelligence-graph-client at >=0.1.0-pre  # ✅
  - events-spine adopted into SI/I (Stage 2d)      # ✅ (2026-05-21)
  - solution-intelligence-agents at >=0.2.0-pre    # ✅ (Phase 2.5, 2026-05-22 — backend-pluggable)
  - solution-intelligence-graph shipped (Stage 3)  # ⏳

future_compositions_to_recognize:
  - cli-shell-pattern         # may become its own archetype
  - graph-client-server-split # may become its own archetype
  - workspace-config-convention
  - orchestrator              # certainly its own archetype eventually
